name: 1A. Unified Stream

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  run-stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN_ALL }}

      # --- CRITICAL STEP: 5-6 GB Files Ke Liye Space Khali Karna ---
      - name: Free Disk Space for Heavy Videos
        run: |
          echo "=== BEFORE CLEANING ==="
          df -h
          echo "Cleaning up unnecessary large directories (Android, .NET, GHC)..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          echo "=== AFTER CLEANING ==="
          df -h # Isse aapko logs me dikh jayega ki kitni space khali hui (approx 25GB+ free)

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Node.js (for yt-dlp JS Runtime)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull Latest Changes (Maintain Persistence)
        run: |
          git pull origin ${GITHUB_REF_NAME} --rebase

      - name: Install and Start Cloudflare WARP (TUN Global Mode)
        run: |
          # 1. Repository aur GPG Key set karein
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          
          # 2. Install
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          
          # 3. Start Service
          sudo systemctl start warp-svc
          sleep 2
          
          # 4. Register (New CLI Syntax compatible)
          warp-cli --accept-tos registration new || warp-cli registration new
          
          # 5. STRICT FIX: Mode ko PROXY se badal kar TUN (Standard VPN) karein
          # Yeh pure GitHub runner ka internet traffic WARP se routing kar dega
          warp-cli --accept-tos mode warp || warp-cli mode warp
          
          # 6. Connect
          warp-cli --accept-tos connect || warp-cli connect
          sleep 5
          
          # 7. Verify ki pure system ka IP change hua ya nahi
          curl https://cloudflare.com/cdn-cgi/trace

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp python-dotenv
          pip install --upgrade yt-dlp python-dotenv

      - name: Execute Kick Stream
        env:
          KICK_RTMP_URL: ${{ secrets.KICK_RTMP_URL }}
          KICK_STREAM_KEY: ${{ secrets.KICK_STREAM_KEY }}
          YT_DLP_XT_ARGS: "youtube:player_client=android,web;skip=dash,hls"
        run: python unified_stream.py

      - name: Commit and Push Changes (Update stream.json Status)
        run: |
          git add stream.json  
          if git diff --staged --quiet; then
            echo "[INFO] No videos were streamed or no status changes. Skipping push."
          else
            echo "[OK] Stream status updated in json. Committing and pushing..."
            git commit -m "Automated: Update stream.json status after Kick stream [skip ci]"
            git pull origin ${GITHUB_REF_NAME} --rebase
            git push origin ${GITHUB_REF_NAME}
          fi