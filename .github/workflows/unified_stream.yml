name: Unified Stream

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Permissions required to update and push stream.json back to repo
permissions:
  contents: write

jobs:
  run-stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Full history pull taaki push conflict na ho

      # --- CRITICAL: 25GB+ space khali karne ke liye step ---
      - name: Free Disk Space for Heavy Videos
        run: |
          echo "=== BEFORE CLEANING ==="
          df -h
          echo "Removing un-used large directories..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          echo "=== AFTER CLEANING ==="
          df -h

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull Latest Changes (Maintain Persistence)
        run: |
          git pull origin ${GITHUB_REF_NAME} --rebase

      # --- FFmpeg ke sath aria2 (High speed engine) install kiya ---
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2
          pip install yt-dlp python-dotenv

      - name: Execute Kick Stream
        env:
          KICK_RTMP_URL: ${{ secrets.KICK_RTMP_URL }}
          KICK_STREAM_KEY: ${{ secrets.KICK_STREAM_KEY }}
        run: python unified_stream.py

      - name: Commit and Push Changes (Update stream.json Status)
        run: |
          git add stream.json  
          if git diff --staged --quiet; then
            echo "[INFO] No videos were streamed or no status changes. Skipping push."
          else
            echo "[OK] Stream status updated in json. Committing and pushing..."
            git commit -m "Automated: Update stream.json status after Kick stream [skip ci]"
            git push origin ${GITHUB_REF_NAME}
          fi