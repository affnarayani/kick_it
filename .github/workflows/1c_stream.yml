name: 1C. Stream

on:
  workflow_dispatch: # Taaki manual button bhi rahe
  workflow_run:
    workflows: ["1B. Wait"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# GitHub Actions ko stream.json update karne aur push karne ki permission dene ke liye
permissions:
  contents: write

jobs:
  run-stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Full git history pull karega taaki status write ke baad push fail na ho

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull Latest Changes (Maintain Persistence)
        run: |
          git pull origin ${GITHUB_REF_NAME} --rebase

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install requests python-dotenv

      - name: Execute Kick Stream
        env:
          KICK_RTMP_URL: ${{ secrets.KICK_RTMP_URL }}
          KICK_STREAM_KEY: ${{ secrets.KICK_STREAM_KEY }}
          # Agar aap metadata automation use kar rahe hain to inko bhi GitHub Secrets me add kar dena:
          # CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          # KICK_API_TOKEN: ${{ secrets.KICK_API_TOKEN }}
        run: python find_id.py # Yahan apne main streaming python file ka sahi naam likhein (e.g., find_id.py ya kick_stream.py)

      - name: Commit and Push Changes (Update stream.json Status)
        run: |
          git add stream.json  
          if git diff --staged --quiet; then
            echo "[INFO] No videos were streamed or no status changes. Skipping push."
          else
            echo "[OK] Stream status updated in json. Committing and pushing..."
            git commit -m "Automated: Update stream.json status after Kick stream [skip ci]"
            git push origin ${GITHUB_REF_NAME}
          fi